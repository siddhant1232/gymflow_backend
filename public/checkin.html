<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GymFlow Check-in</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #333;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #005bb5;
    }
    button:disabled {
      background-color: #99c2eb;
      cursor: not-allowed;
    }
    .error {
      color: #d93025;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }
    /* Success View */
    #success-view {
      display: none;
    }
    .member-photo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin: 20px auto;
      border: 4px solid #4CAF50;
    }
    .success-text {
      color: #4CAF50;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .member-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .expiry-date {
      color: #666;
      font-size: 14px;
    }
    .trainer-note {
      margin-top: 25px;
      padding: 15px;
      background-color: #e8f5e9;
      border-radius: 8px;
      font-size: 14px;
      color: #2e7d32;
    }
  </style>
</head>
<body>

  <div class="container" id="form-container">
    <h1>GymFlow Check-in</h1>
    <p style="color: #666; margin-bottom: 25px; font-size: 14px;">Enter your phone number and PIN to check in today.</p>
    
    <div id="error-message" class="error"></div>
    
    <form id="checkin-form">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 1234567890" required>
      </div>
      <div class="form-group">
        <label for="pin">4-Digit PIN</label>
        <input type="password" id="pin" placeholder="••••" maxlength="4" pattern="\d{4}" title="Please enter 4 digits" required>
      </div>
      <button type="submit" id="submit-btn">Check In</button>
    </form>
  </div>

  <div class="container" id="success-view">
    <div class="success-text">✓ Checked In Successfully</div>
    <img id="m-photo" class="member-photo" src="" alt="Member Photo">
    <div class="member-name" id="m-name">Member Name</div>
    <div class="expiry-date">Expires: <span id="m-expiry">YYYY-MM-DD</span></div>
    
    <div class="trainer-note">
      <strong>Trainer:</strong> Please verify the member's photo before granting access.
    </div>
  </div>

  <script>
    document.getElementById('checkin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const phone = document.getElementById('phone').value.trim();
      const pin = document.getElementById('pin').value.trim();
      const btn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('error-message');
      
      errorDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      
      try {
        const response = await fetch('/api/checkin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone, pin })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Show success view
          document.getElementById('form-container').style.display = 'none';
          document.getElementById('success-view').style.display = 'block';
          
          document.getElementById('m-name').textContent = data.data.name;
          const expiryDate = new Date(data.data.expiryDate).toDateString();
          document.getElementById('m-expiry').textContent = expiryDate;
          
          if (data.data.photoUrl) {
            document.getElementById('m-photo').src = data.data.photoUrl;
          } else {
            // Default avatar if no photo
            document.getElementById('m-photo').src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 24 24" fill="%23ccc"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
          }
        } else {
          errorDiv.textContent = data.message || 'Check-in failed. Please try again.';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check In';
      }
    });
  </script>
</body>
</html>
